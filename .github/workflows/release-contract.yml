name: release-public-contract

on:
  push:
    branches: [main]
    paths:
      - package.json
      - CHANGELOG.md
      - .github/workflows/release-contract.yml
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Create the immutable contract tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test "$version" != "0.0.0"
          grep -q "^## ${version} " CHANGELOG.md
          tag="v${version}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; leaving the immutable release untouched."
            exit 0
          fi
          target_sha="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$target_sha" -m "Veripsa public contract ${tag}"
          git push origin "$tag"
          gh release create "$tag" --verify-tag \
            --title "Veripsa public contract ${tag}" \
            --generate-notes
